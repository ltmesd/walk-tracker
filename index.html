<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>SUSTEP</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY"></script>

<style>
html,body{
  margin:0;
  height:100%;
  font-family:system-ui;
  background:#f4f7f6;
}
#map{
  height:100%;
  width:100%;
}
.controls{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  bottom:16px;
  background:rgba(255,255,255,.96);
  padding:14px 16px;
  border-radius:20px;
  box-shadow:0 15px 40px rgba(0,0,0,.22);
  text-align:center;
  width:92%;
  max-width:320px;
}
button{
  padding:12px 16px;
  margin:4px;
  border:none;
  border-radius:999px;
  font-size:15px;
  font-weight:600;
}
.start{background:#22c55e;color:white}
.pause{background:#f59e0b;color:white}
.finish{background:#ef4444;color:white}
.btn-row{display:flex;gap:8px}
.btn-row button{flex:1}
.finish{width:100%;margin-top:6px}
</style>
</head>

<body>

<div id="map"></div>

<div class="controls">
  ระยะทาง: <b><span id="distance">0.00</span> km</b><br>
  ลดคาร์บอน: <b><span id="carbon">0.000</span> kgCO₂e</b><br>
  เวลา: <span id="time">00:00</span><br><br>

  <div class="btn-row">
    <button id="startBtn" class="start">Start</button>
    <button id="pauseBtn" class="pause">Pause</button>
  </div>
  <button id="finishBtn" class="finish">Finish</button>
</div>

<script>
// =============================
// CONFIG
// =============================
const EF_CAR = 0.192;

// =============================
// STATE
// =============================
let map, polyline, userMarker;
let watchId = null;
let totalDistance = 0;
let lastPoint = null;
let elapsedSeconds = 0;
let timerInterval = null;
let isTracking = false;

// =============================
// MAP
// =============================
function initMap() {

  map = new google.maps.Map(document.getElementById("map"), {
    center: { lat: 13.7563, lng: 100.5018 },
    zoom: 17,
    gestureHandling: "greedy"
  });

  // เส้นทาง
  polyline = new google.maps.Polyline({
    map,
    path: [],
    strokeColor: "#22c55e",
    strokeWeight: 5
  });

  // ⭐⭐⭐ จุดฟ้ากลมแบบในรูป ⭐⭐⭐
  userMarker = new google.maps.Marker({
    map,
    position: { lat: 13.7563, lng: 100.5018 },
    icon: {
      path: google.maps.SymbolPath.CIRCLE,
      scale: 8,
      fillColor: "#3b82f6",
      fillOpacity: 1,
      strokeColor: "#ffffff",
      strokeWeight: 3
    },
    zIndex: 999
  });
}
window.onload = initMap;

// =============================
// TIMER
// =============================
function startTimer(){
  clearInterval(timerInterval);
  timerInterval = setInterval(()=>{
    if(!isTracking) return;
    elapsedSeconds++;
    updateUI();
  },1000);
}

// =============================
// DISTANCE
// =============================
function getDistance(p1,p2){
  const R=6371000;
  const toRad=x=>x*Math.PI/180;
  const dLat=toRad(p2.lat-p1.lat);
  const dLon=toRad(p2.lng-p1.lng);
  const a=Math.sin(dLat/2)**2+
    Math.cos(toRad(p1.lat))*Math.cos(toRad(p2.lat))*
    Math.sin(dLon/2)**2;
  return 2*R*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// =============================
// GPS
// =============================
function handlePosition(pos){
  if(!isTracking) return;

  const {latitude,longitude,accuracy}=pos.coords;
  if(accuracy>30) return;

  const current={lat:latitude,lng:longitude};

  if(lastPoint){
    const dist=getDistance(lastPoint,current);
    if(dist<60) totalDistance+=dist;
  }

  lastPoint=current;
  polyline.getPath().push(current);

  userMarker.setPosition(current);
  map.panTo(current);

  updateUI();
}

// =============================
// UI
// =============================
function updateUI(){
  const km=totalDistance/1000;
  distance.textContent=km.toFixed(2);
  carbon.textContent=(km*EF_CAR).toFixed(3);

  const m=Math.floor(elapsedSeconds/60).toString().padStart(2,"0");
  const s=(elapsedSeconds%60).toString().padStart(2,"0");
  time.textContent=`${m}:${s}`;
}

// =============================
// BUTTONS
// =============================
startBtn.onclick=()=>{
  isTracking=true;
  startTimer();

  watchId=navigator.geolocation.watchPosition(
    handlePosition,
    err=>console.error(err),
    {enableHighAccuracy:true}
  );
};

pauseBtn.onclick=()=>{
  isTracking=!isTracking;
};

finishBtn.onclick=()=>{
  isTracking=false;
  clearInterval(timerInterval);
};
</script>

</body>
</html>
