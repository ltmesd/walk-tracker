<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>SUSTEP</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAdXvTwv1cry2Q2yNZkCgaxpZy04YQw_sw"></script>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
html,body{margin:0;height:100%;font-family:-apple-system;background:#f4f7f6}
#map{height:100%;width:100%}

.controls{
position:absolute;
left:50%;
transform:translateX(-50%);
bottom:16px;
background:rgba(255,255,255,.95);
backdrop-filter:blur(20px);
padding:18px;
border-radius:26px;
box-shadow:0 20px 50px rgba(0,0,0,.25);
text-align:center;
width:92%;
max-width:340px;
}

.stats{font-size:15px;line-height:1.6}

.btn-row{display:flex;gap:12px;margin-top:14px}

button{
padding:14px;
border:none;
border-radius:999px;
font-size:16px;
font-weight:600;
display:flex;
align-items:center;
justify-content:center;
flex:1;
gap:6px;
}

.start{background:#4CAF50;color:white}
.pause{background:#F4A62A;color:white}
.finish{background:#E74C3C;color:white;width:100%;margin-top:12px}

#summaryModal{
position:fixed;inset:0;
background:rgba(0,0,0,.4);
display:none;
align-items:center;
justify-content:center;
z-index:999;
}

.summary-card{
background:white;
padding:30px;
border-radius:28px;
width:85%;
max-width:340px;
text-align:center;
}

.main-number{font-size:38px;font-weight:700}
.sub{color:#666;margin-top:6px}
.green{color:#16a34a;margin-top:6px}

.summary-buttons{
display:flex;
gap:14px;
margin-top:18px;
}

.summary-buttons button{flex:1}
.save-btn{background:#4CAF50;color:white}
.done-btn{background:#F4A62A;color:white}
</style>
</head>

<body>

<div id="map"></div>

<div class="controls">
<div class="stats">
ระยะทาง <b><span id="distance">0.00</span> km</b><br>
ลด <b><span id="carbon">0.000</span> kgCO₂e</b><br>
เวลา <b><span id="time">00:00</span></b>
</div>

<div class="btn-row">
<button id="startBtn" class="start">Start</button>
<button id="pauseBtn" class="pause">Pause</button>
</div>

<button id="finishBtn" class="finish">Finish</button>
</div>

<div id="summaryModal">
<div class="summary-card" id="captureArea">

<h3>Walk Complete</h3>

<div class="main-number">
<span id="sumDist">0.00</span> km
</div>

<div class="sub">
เวลา <b id="sumTime">00:00</b>
</div>

<div class="green">
ลด <b id="sumCarbon">0.000</b> kgCO₂e
</div>

<div id="finishDateTime" class="sub"></div>

<div class="summary-buttons">
<button onclick="saveImage()" class="save-btn">Save</button>
<button onclick="closeSummary()" class="done-btn">Done</button>
</div>

</div>
</div>

<script>
const WEBHOOK_URL="https://script.google.com/macros/s/AKfycbz04fVf9Kr5QiJpIuJNdPuec5G7mTOTmbPd0246nE1pGlGq5HNlRR_Hc35gDX_ncovG/exec";
const EF_CAR=0.192;

let map,polyline,watchId=null;

let totalDistance=0,lastPoint=null,pathCoords=[];
let elapsedSeconds=0,timerInterval;
let isTracking=false,isPaused=false;

/* ✅ smoothing */
let lastPositions=[];

/* MAP */
function initMap(){
map=new google.maps.Map(document.getElementById("map"),{
center:{lat:13.7563,lng:100.5018},
zoom:16
});

polyline=new google.maps.Polyline({
map,
path:[],
strokeColor:"#22c55e",
strokeWeight:5
});
}
window.onload=initMap;

/* TIMER */
function startTimer(){
timerInterval=setInterval(()=>{
if(!isTracking) return;
elapsedSeconds++;
updateUI();
},1000);
}
function stopTimer(){clearInterval(timerInterval);}

/* DIST */
function getDistance(p1,p2){
const R=6371000,toRad=x=>x*Math.PI/180;
const dLat=toRad(p2.lat-p1.lat),dLng=toRad(p2.lng-p1.lng);
const a=Math.sin(dLat/2)**2+
Math.cos(toRad(p1.lat))*Math.cos(toRad(p2.lat))*
Math.sin(dLng/2)**2;
return 2*R*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

/* ✅ smooth */
function smoothPosition(p){
lastPositions.push(p);
if(lastPositions.length>3) lastPositions.shift();

let avgLat=0,avgLng=0;
lastPositions.forEach(pos=>{
avgLat+=pos.lat;
avgLng+=pos.lng;
});
return {
lat:avgLat/lastPositions.length,
lng:avgLng/lastPositions.length
};
}

/* ✅ GPS core */
function handlePosition(pos){
if(!isTracking||isPaused) return;

const {latitude,longitude,accuracy}=pos.coords;

/* ❌ ตัด GPS แย่ */
if(accuracy>30) return;

let current=smoothPosition({lat:latitude,lng:longitude});

if(lastPoint){
const dist=getDistance(lastPoint,current);

/* ❌ กัน jitter ตอนยืน */
if(dist<1) return;

/* ❌ กันกระโดด */
if(dist>20) return;

totalDistance+=dist;
}

lastPoint=current;

pathCoords.push(current);
polyline.setPath(pathCoords);

map.panTo(current);

updateUI();
}

/* UI */
function updateUI(){
const km=totalDistance/1000;
distance.textContent=km.toFixed(2);
carbon.textContent=(km*EF_CAR).toFixed(3);

const m=Math.floor(elapsedSeconds/60).toString().padStart(2,"0");
const s=(elapsedSeconds%60).toString().padStart(2,"0");
time.textContent=`${m}:${s}`;
}

/* START */
startBtn.onclick=()=>{
resetSession();
isTracking=true;
isPaused=false;
startTimer();

watchId=navigator.geolocation.watchPosition(
handlePosition,
(err)=>console.log(err),
{
enableHighAccuracy:true,
maximumAge:0,
timeout:10000
}
);
};

/* PAUSE */
pauseBtn.onclick=()=>{
isPaused=!isPaused;
isTracking=!isPaused;
if(isPaused) stopTimer(); else startTimer();
};

/* FINISH */
finishBtn.onclick=()=>{
stopTimer();

summaryModal.style.display="flex";

sumDist.textContent=(totalDistance/1000).toFixed(2);

const m=Math.floor(elapsedSeconds/60).toString().padStart(2,"0");
const s=(elapsedSeconds%60).toString().padStart(2,"0");
sumTime.textContent=`${m}:${s}`;

sumCarbon.textContent=((totalDistance/1000)*EF_CAR).toFixed(3);

navigator.geolocation.clearWatch(watchId);
};

/* SAVE */
function saveImage(){
html2canvas(document.querySelector("#captureArea")).then(canvas=>{
const link=document.createElement("a");
link.download="sustep.png";
link.href=canvas.toDataURL();
link.click();
});
}

function closeSummary(){
summaryModal.style.display="none";
}

/* RESET */
function resetSession(){
totalDistance=0;
lastPoint=null;
pathCoords=[];
elapsedSeconds=0;
lastPositions=[];
polyline.setPath([]);
time.textContent="00:00";
updateUI();
}
</script>

</body>
</html>
