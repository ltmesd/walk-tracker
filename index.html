<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>SUSTEP</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

<!-- ✅ Google Maps API ใหม่ -->
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyD7xnpAUWUrhzQwSQZlfasfGY7ys3WlGOc"></script>

<!-- ✅ html2canvas สำหรับแคป -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
html,body{
margin:0;height:100%;
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",system-ui;
background:#000;
}
#map{height:100%;width:100%}

/* iOS Glass UI */
.controls{
position:absolute;
left:50%;
transform:translateX(-50%);
bottom:20px;

background:rgba(255,255,255,0.75);
backdrop-filter:blur(25px);
-webkit-backdrop-filter:blur(25px);

padding:18px;
border-radius:28px;
box-shadow:0 10px 40px rgba(0,0,0,.25);

text-align:center;
width:92%;
max-width:340px;
}

.stats{
font-size:20px;
font-weight:600;
line-height:1.6;
}

.time{
font-size:14px;
color:#555;
}

/* ปุ่ม */
button{
padding:14px;
border:none;
border-radius:999px;
font-size:16px;
font-weight:600;
}

.start{background:#34c759;color:white}
.pause{background:#ff9f0a;color:white}
.finish{background:#ff3b30;color:white}
.save{background:#30d158;color:white}
.done{background:#ff9f0a;color:white}

button:disabled{opacity:.4}

.btn-row{display:flex;gap:10px}
.btn-row button{flex:1}
.finish{width:100%;margin-top:8px}

/* modal */
#summaryModal{
position:fixed;inset:0;
background:rgba(0,0,0,.4);
display:none;
align-items:center;
justify-content:center;
z-index:999;
}

.summary-card{
background:rgba(255,255,255,0.9);
backdrop-filter:blur(25px);
padding:24px;
border-radius:28px;
width:85%;
max-width:320px;
text-align:center;
}

.big{
font-size:40px;
font-weight:700;
margin:10px 0;
}

.sub{color:#666;margin-bottom:6px}
.green{color:#22c55e;margin-bottom:12px}

.btn-bottom{
display:flex;
gap:10px;
margin-top:10px;
}
.btn-bottom button{flex:1}
</style>
</head>

<body>

<div id="map"></div>

<div class="controls">

<div class="stats">
<span id="distance">0.00</span> km<br>
<span class="time">เวลา <span id="time">00:00</span></span><br>
<span style="color:#22c55e">ลด <span id="carbon">0.000</span> kgCO₂e</span>
</div>

<div class="btn-row">
<button id="startBtn" class="start">Start</button>
<button id="pauseBtn" class="pause">Pause</button>
</div>

<button id="finishBtn" class="finish">Finish</button>

</div>

<!-- ✅ Summary -->
<div id="summaryModal">
<div class="summary-card" id="captureArea">

<div class="big"><span id="sumDist">0.00</span> km</div>

<div class="sub">เวลา <b id="sumTime">00:00</b></div>

<div class="green">ลด <b id="sumCarbon">0.000</b> kgCO₂e</div>

<div class="sub" id="sumDate"></div>

<div class="btn-bottom">
<button onclick="saveImage()" class="save">📸 Save</button>
<button onclick="closeSummary()" class="done">Done</button>
</div>

</div>
</div>

<script>

// CONFIG
const WEBHOOK_URL="https://script.google.com/macros/s/AKfycbz04fVf9Kr5QiJpIuJNdPuec5G7mTOTmbPd0246nE1pGlGq5HNlRR_Hc35gDX_ncovG/exec";
const EF_CAR=0.192;

// USER
const params=new URLSearchParams(window.location.search);
const userEmail=params.get("email")||"unknown";
const userName=params.get("name")||"unknown";

// STATE
let map,polyline,userMarker;
let watchId=null;

let totalDistance=0;
let lastPoint=null;
let pathCoords=[];

let elapsedSeconds=0;
let timerInterval=null;

let isTracking=false;
let isPaused=false;
let sessionActive=false;
let startTime=null;

// MAP
function initMap(){
map=new google.maps.Map(document.getElementById("map"),{
center:{lat:13.7563,lng:100.5018},
zoom:16,
gestureHandling:"greedy"
});

polyline=new google.maps.Polyline({
map,
path:[],
strokeColor:"#34c759",
strokeWeight:5
});

userMarker=new google.maps.Marker({
map,
position:{lat:13.7563,lng:100.5018}
});
}
window.addEventListener("load",initMap);

// TIMER
function startTimer(){
clearInterval(timerInterval);
timerInterval=setInterval(()=>{
if(!isTracking) return;
elapsedSeconds++;
updateUI();
},1000);
}
function stopTimer(){clearInterval(timerInterval);}

// DISTANCE
function getDistance(p1,p2){
const R=6371000;
const toRad=x=>x*Math.PI/180;

const dLat=toRad(p2.lat-p1.lat);
const dLng=toRad(p2.lng-p1.lng);

const a=Math.sin(dLat/2)**2+
Math.cos(toRad(p1.lat))*Math.cos(toRad(p2.lat))*
Math.sin(dLng/2)**2;

return 2*R*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// GPS
function handlePosition(pos){
if(!isTracking||isPaused) return;

const {latitude,longitude,accuracy}=pos.coords;
if(accuracy>30) return;

const current={lat:latitude,lng:longitude};

if(lastPoint){
const dist=getDistance(lastPoint,current);
if(dist<60) totalDistance+=dist;
}

lastPoint=current;
pathCoords.push(current);

polyline.setPath(pathCoords);
userMarker.setPosition(current);
map.panTo(current);

updateUI();
}

// UI
function updateUI(){
const km=totalDistance/1000;

document.getElementById("distance").textContent=km.toFixed(2);
document.getElementById("carbon").textContent=(km*EF_CAR).toFixed(3);

const m=Math.floor(elapsedSeconds/60).toString().padStart(2,"0");
const s=(elapsedSeconds%60).toString().padStart(2,"0");

document.getElementById("time").textContent=`${m}:${s}`;
}

// START
startBtn.onclick=()=>{
if(sessionActive) return;

sessionActive=true;
isTracking=true;
isPaused=false;
startTime=new Date();

startTimer();

watchId=navigator.geolocation.watchPosition(handlePosition);

};

// PAUSE
pauseBtn.onclick=()=>{
if(!sessionActive) return;

isPaused=!isPaused;
isTracking=!isPaused;

if(isPaused) stopTimer();
else startTimer();
};

// FINISH
finishBtn.onclick=async()=>{

stopTimer();

const km=(totalDistance/1000);
const m=Math.floor(elapsedSeconds/60).toString().padStart(2,"0");
const s=(elapsedSeconds%60).toString().padStart(2,"0");

document.getElementById("sumDist").textContent=km.toFixed(2);
document.getElementById("sumTime").textContent=`${m}:${s}`;
document.getElementById("sumCarbon").textContent=(km*EF_CAR).toFixed(3);
document.getElementById("sumDate").textContent=new Date().toLocaleString();

document.getElementById("summaryModal").style.display="flex";

if(watchId) navigator.geolocation.clearWatch(watchId);

sessionActive=false;
};

// SAVE IMAGE
function saveImage(){
html2canvas(document.getElementById("captureArea")).then(canvas=>{
const link=document.createElement("a");
link.download="sustep.png";
link.href=canvas.toDataURL();
link.click();
});
}

// CLOSE
function closeSummary(){
document.getElementById("summaryModal").style.display="none";
}
</script>

</body>
</html>
