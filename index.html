<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>SUSTEP</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY"></script>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#f4f7f6}
#map{height:100%;width:100%}

.controls{
position:absolute;
left:50%;
transform:translateX(-50%);
bottom:16px;
background:white;
padding:14px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.1);
width:90%;
max-width:320px;
text-align:center;
}

button{
padding:12px;
border:none;
border-radius:999px;
font-weight:600;
margin:4px;
}

.start{background:#22c55e;color:white}
.pause{background:#f59e0b;color:white}
.finish{background:#ef4444;color:white}

#summaryModal{
position:fixed;inset:0;
background:rgba(0,0,0,.3);
display:none;
align-items:center;
justify-content:center;
}

.summary-card{
background:white;
padding:28px;
border-radius:28px;
width:85%;
max-width:320px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,.08);
}

/* Apple style */
.title{
font-size:18px;
font-weight:600;
margin-bottom:12px;
}

.main-metric{
font-size:40px;
font-weight:700;
letter-spacing:-1px;
margin-bottom:6px;
}

.main-metric small{
font-size:16px;
color:#666;
}

.sub-info{
font-size:13px;
color:#999;
margin-bottom:14px;
}

.carbon{
font-size:16px;
font-weight:600;
color:#16a34a;
margin-bottom:6px;
}

.time{
font-size:14px;
color:#666;
margin-bottom:18px;
}
</style>
</head>

<body>

<div id="map"></div>

<div class="controls">
ระยะทาง: <span id="distance">0.00</span> km<br>
ลด: <span id="carbon">0.000</span> kgCO₂e<br>
เวลา: <span id="time">00:00</span><br>

<button id="startBtn" class="start">Start</button>
<button id="pauseBtn" class="pause">Pause</button>
<button id="finishBtn" class="finish">Finish</button>
</div>

<div id="summaryModal">
<div class="summary-card">

<div class="title">Walk Complete</div>

<div class="main-metric">
<span id="sumDist">0.00</span>
<small>km</small>
</div>

<div class="sub-info" id="finishDateTime">-</div>

<div class="carbon">
ลด <span id="sumCarbon">0.000</span> kgCO₂e
</div>

<div class="time">
เวลา <span id="sumTime">00:00</span>
</div>

<button onclick="saveImage()" class="start">Save</button>
<button onclick="closeSummary()" class="pause">Done</button>

</div>
</div>

<script>

const EF_CAR=0.192;

let totalDistance=0;
let elapsedSeconds=0;
let timer;

function start(){
timer=setInterval(()=>{
elapsedSeconds++;
updateUI();
},1000);
}

function updateUI(){
const km=totalDistance.toFixed(2);
document.getElementById("distance").textContent=km;
document.getElementById("carbon").textContent=(km*EF_CAR).toFixed(3);

const m=Math.floor(elapsedSeconds/60).toString().padStart(2,"0");
const s=(elapsedSeconds%60).toString().padStart(2,"0");
document.getElementById("time").textContent=`${m}:${s}`;
}

document.getElementById("startBtn").onclick=start;

document.getElementById("finishBtn").onclick=()=>{
clearInterval(timer);

const km=totalDistance.toFixed(2);
document.getElementById("sumDist").textContent=km;

const m=Math.floor(elapsedSeconds/60).toString().padStart(2,"0");
const s=(elapsedSeconds%60).toString().padStart(2,"0");
document.getElementById("sumTime").textContent=`${m}:${s}`;

document.getElementById("sumCarbon").textContent=(km*EF_CAR).toFixed(3);

// date format
const now=new Date();
const d=String(now.getDate()).padStart(2,'0');
const mo=String(now.getMonth()+1).padStart(2,'0');
const y=now.getFullYear();
const h=String(now.getHours()).padStart(2,'0');
const mi=String(now.getMinutes()).padStart(2,'0');

document.getElementById("finishDateTime").textContent=`${d}/${mo}/${y} ${h}:${mi}`;

document.getElementById("summaryModal").style.display="flex";
};

function closeSummary(){
document.getElementById("summaryModal").style.display="none";
}

function saveImage(){
html2canvas(document.querySelector(".summary-card"))
.then(canvas=>{
const link=document.createElement("a");
link.download="result.png";
link.href=canvas.toDataURL();
link.click();
});
}

</script>

</body>
</html>
