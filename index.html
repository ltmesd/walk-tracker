<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>SUSTEP</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyD7xnpAUWUrhzQwSQZlfasfGY7ys3WlGOc"></script>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
html,body{margin:0;height:100%;font-family:system-ui}
#map{height:100%;width:100%}

/* CONTROL */
.controls{
position:absolute;
left:50%;
transform:translateX(-50%);
bottom:16px;
background:white;
padding:16px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.2);
width:90%;
max-width:320px;
text-align:center;
}

.btn-row{display:flex;gap:12px;margin-top:10px}
.btn-row button{flex:1}

button{
padding:14px;
border:none;
border-radius:999px;
font-weight:600;
display:flex;
justify-content:center;
align-items:center;
}

.start{background:#22c55e;color:white}
.pause{background:#f59e0b;color:white}
.finish{background:#ef4444;color:white;width:100%;margin-top:10px}

/* MODAL */
#summaryModal{
position:fixed;inset:0;
background:rgba(0,0,0,.4);
display:none;
align-items:center;
justify-content:center;
}

.summary-card{
background:white;
padding:28px;
border-radius:28px;
width:85%;
max-width:320px;
text-align:center;
}

.summary-buttons{display:flex;gap:14px;margin-top:12px}
.summary-buttons button{flex:1}
.save-btn{background:#22c55e;color:white}
.done-btn{background:#f59e0b;color:white}
</style>
</head>

<body>

<div id="map"></div>

<div class="controls">
<div>
ระยะทาง <b><span id="distance">0.00</span> km</b><br>
ลด <b><span id="carbon">0.000</span> kgCO₂e</b><br>
เวลา <span id="time">00:00</span>
</div>

<div class="btn-row">
<button id="startBtn" class="start">Start</button>
<button id="pauseBtn" class="pause">Pause</button>
</div>

<button id="finishBtn" class="finish">Finish</button>
</div>

<!-- SUMMARY -->
<div id="summaryModal">
<div class="summary-card" id="captureArea">

<h3>Walk Complete 🎉</h3>

<h1><span id="sumDist">0.00</span> km</h1>
<div>เวลา <span id="sumTime">00:00</span></div>
<div>ลด <span id="sumCarbon">0.000</span> kgCO₂e</div>
<div id="finishDateTime"></div>

<div class="summary-buttons">
<button onclick="saveImage()" class="save-btn">📷 Save</button>
<button onclick="closeSummary()" class="done-btn">Done</button>
</div>

</div>
</div>

<script>
const EF_CAR=0.192;

let map,polyline,marker,watchId;
let totalDistance=0,lastPoint=null;
let elapsed=0,timer;
let isTracking=false;
let isPaused=false;

/* MAP */
function initMap(){
map=new google.maps.Map(document.getElementById("map"),{
center:{lat:13.7563,lng:100.5018},
zoom:16
});
polyline=new google.maps.Polyline({
map,
path:[],
strokeColor:"#22c55e",
strokeWeight:5
});
marker=new google.maps.Marker({map});
}
window.onload=initMap;

/* TIMER */
function startTimer(){
timer=setInterval(()=>{
if(!isTracking||isPaused) return;
elapsed++;
updateUI();
},1000);
}

/* DISTANCE */
function getDistance(a,b){
const R=6371000;
const toRad=x=>x*Math.PI/180;
const dLat=toRad(b.lat-a.lat);
const dLng=toRad(b.lng-a.lng);
const x=Math.sin(dLat/2)**2+
Math.cos(toRad(a.lat))*Math.cos(toRad(b.lat))*
Math.sin(dLng/2)**2;
return 2*R*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

/* GPS (แก้ให้ขยับจริง) */
function handlePosition(pos){
if(!isTracking||isPaused) return;

const {latitude,longitude,accuracy}=pos.coords;

// 🔥 ผ่อนให้รับค่าได้
if(accuracy>100) return;

const current={lat:latitude,lng:longitude};

// 🔥 บังคับ map ตามเรา
map.panTo(current);
map.setZoom(18);
marker.setPosition(current);

if(lastPoint){
const d=getDistance(lastPoint,current);

// 🔥 กัน GPS เด้ง
if(d>1 && d<100){
totalDistance+=d;
}
}

lastPoint=current;
polyline.getPath().push(current);

updateUI();
}

/* UI */
function updateUI(){
const km=totalDistance/1000;
distance.textContent=km.toFixed(2);
carbon.textContent=(km*EF_CAR).toFixed(3);

const m=Math.floor(elapsed/60).toString().padStart(2,"0");
const s=(elapsed%60).toString().padStart(2,"0");
time.textContent=`${m}:${s}`;
}

/* START */
startBtn.onclick=()=>{
totalDistance=0;
elapsed=0;
lastPoint=null;
polyline.setPath([]);

isTracking=true;
isPaused=false;

startTimer();

watchId=navigator.geolocation.watchPosition(
handlePosition,
(err)=>console.log(err),
{
enableHighAccuracy:true,
maximumAge:0,
timeout:10000
}
);
};

/* PAUSE */
pauseBtn.onclick=()=>{
isPaused=!isPaused;
pauseBtn.textContent=isPaused?"Resume":"Pause";
};

/* FINISH */
finishBtn.onclick=()=>{
isTracking=false;
clearInterval(timer);

navigator.geolocation.clearWatch(watchId);

const km=(totalDistance/1000);
const m=Math.floor(elapsed/60).toString().padStart(2,"0");
const s=(elapsed%60).toString().padStart(2,"0");

sumDist.textContent=km.toFixed(2);
sumTime.textContent=`${m}:${s}`;
sumCarbon.textContent=(km*EF_CAR).toFixed(3);

// HH:MM
const now=new Date();
const d=String(now.getDate()).padStart(2,'0');
const mo=String(now.getMonth()+1).padStart(2,'0');
const y=now.getFullYear();
const h=String(now.getHours()).padStart(2,'0');
const mi=String(now.getMinutes()).padStart(2,'0');

finishDateTime.textContent=`${d}/${mo}/${y} ${h}:${mi}`;

summaryModal.style.display="flex";
};

/* SAVE */
function saveImage(){
html2canvas(document.querySelector("#captureArea")).then(canvas=>{
const link=document.createElement("a");
link.download="sustep.png";
link.href=canvas.toDataURL();
link.click();
});
}

function closeSummary(){
summaryModal.style.display="none";
}
</script>

</body>
</html>
