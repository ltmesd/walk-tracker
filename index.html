<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>SUSTEP</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAdXvTwv1cry2Q2yNZkCgaxpZy04YQw_sw"></script>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
html,body{margin:0;height:100%;font-family:system-ui;background:#f4f7f6}
#map{height:100%;width:100%}

.controls{
position:absolute;
left:50%;
transform:translateX(-50%);
bottom:16px;
background:rgba(255,255,255,.96);
backdrop-filter:blur(12px);
padding:14px 16px;
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,.22);
text-align:center;
width:92%;
max-width:320px;
}

.stats{font-size:14px;margin-bottom:8px;line-height:1.5}
.time{font-size:13px;color:#666}

button{
padding:12px 16px;margin:4px;border:none;
border-radius:999px;font-size:15px;font-weight:600;
}

.start{background:#22c55e;color:white}
.pause{background:#f59e0b;color:white}
.finish{background:#ef4444;color:white}

button:disabled{opacity:.4}

.btn-row{display:flex;gap:8px}
.btn-row button{flex:1}

.finish{width:100%;margin-top:6px}

#summaryModal{
position:fixed;inset:0;background:rgba(0,0,0,.45);
display:none;align-items:center;justify-content:center;z-index:999;
}

.summary-card{
background:white;
padding:28px;
border-radius:24px;
width:85%;
max-width:320px;
text-align:center;
}
</style>
</head>

<body>

<div id="map"></div>

<div class="controls">

<div class="stats">
ระยะทาง: <b><span id="distance">0.00</span> km</b><br>
ลด: <b><span id="carbon">0.000</span> kgCO₂e</b><br>
<span class="time">เวลา: <span id="time">00:00</span></span>
</div>

<div class="btn-row">
<button id="startBtn" class="start">Start</button>
<button id="pauseBtn" class="pause">Pause</button>
</div>

<button id="finishBtn" class="finish">Finish</button>

</div>

<div id="summaryModal">
<div class="summary-card">

<h2>🎉 Walk Complete</h2>

<div style="font-size:18px;margin:10px 0">
<b id="sumDist">0.00</b> km
</div>

<div style="color:#666;margin-bottom:8px">
เวลา <b id="sumTime">00:00</b>
</div>

<!-- ✅ เพิ่มวันเวลา -->
<div style="color:#666;margin-bottom:8px">
เสร็จเมื่อ <b id="finishDateTime">-</b>
</div>

<div style="color:#16a34a;margin-bottom:20px">
ลด <b id="sumCarbon">0.000</b> kgCO₂e
</div>

<button onclick="saveImage()" class="start">📸 Save</button>
<button onclick="closeSummary()" class="pause">Done</button>

</div>
</div>

<script>

const EF_CAR=0.192;

let map,polyline,userMarker;
let watchId=null;

let totalDistance=0;
let lastPoint=null;
let pathCoords=[];

let elapsedSeconds=0;
let timerInterval=null;

let isTracking=false;
let isPaused=false;
let sessionActive=false;


// MAP
function initMap(){
map=new google.maps.Map(document.getElementById("map"),{
center:{lat:13.7563,lng:100.5018},
zoom:16,
gestureHandling:"greedy"
});

polyline=new google.maps.Polyline({
map,
path:[],
strokeColor:"#22c55e",
strokeWeight:5
});

userMarker=new google.maps.Marker({
map,
position:{lat:13.7563,lng:100.5018},
icon:{
path:google.maps.SymbolPath.CIRCLE,
scale:8,
fillColor:"#3b82f6",
fillOpacity:1,
strokeColor:"#ffffff",
strokeWeight:3
}
});

updateButtons();
}

window.addEventListener("load",initMap);


// TIMER
function startTimer(){
clearInterval(timerInterval);
timerInterval=setInterval(()=>{
if(!isTracking) return;
elapsedSeconds++;
updateUI();
},1000);
}

function stopTimer(){
clearInterval(timerInterval);
}


// DISTANCE
function getDistance(p1,p2){
const R=6371000;
const toRad=x=>x*Math.PI/180;

const dLat=toRad(p2.lat-p1.lat);
const dLng=toRad(p2.lng-p1.lng);

const a=Math.sin(dLat/2)**2+
Math.cos(toRad(p1.lat))*Math.cos(toRad(p2.lat))*
Math.sin(dLng/2)**2;

return 2*R*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}


// GPS
function handlePosition(pos){
if(!isTracking||isPaused) return;

const {latitude,longitude,accuracy}=pos.coords;
if(accuracy>30) return;

const current={lat:latitude,lng:longitude};

if(lastPoint){
const dist=getDistance(lastPoint,current);
if(dist<60) totalDistance+=dist;
}

lastPoint=current;
pathCoords.push(current);

polyline.setPath(pathCoords);
userMarker.setPosition(current);
map.panTo(current);

updateUI();
}


// UI
function updateUI(){
const km=totalDistance/1000;

document.getElementById("distance").textContent=km.toFixed(2);
document.getElementById("carbon").textContent=(km*EF_CAR).toFixed(3);

const m=Math.floor(elapsedSeconds/60).toString().padStart(2,"0");
const s=(elapsedSeconds%60).toString().padStart(2,"0");

document.getElementById("time").textContent=`${m}:${s}`;
}

function updateButtons(){
startBtn.disabled=sessionActive;
pauseBtn.disabled=!sessionActive;
finishBtn.disabled=!sessionActive;
pauseBtn.textContent=isPaused?"Resume":"Pause";
}


// START
startBtn.onclick=()=>{
if(sessionActive) return;

resetSession();

sessionActive=true;
isTracking=true;
isPaused=false;

startTimer();
watchId=navigator.geolocation.watchPosition(handlePosition);

updateButtons();
};


// PAUSE
pauseBtn.onclick=()=>{
if(!sessionActive) return;

isPaused=!isPaused;
isTracking=!isPaused;

if(isPaused) stopTimer();
else startTimer();

updateButtons();
};


// FINISH
finishBtn.onclick=()=>{
if(!sessionActive) return;

stopTimer();

const km=(totalDistance/1000).toFixed(2);
const m=Math.floor(elapsedSeconds/60).toString().padStart(2,"0");
const s=(elapsedSeconds%60).toString().padStart(2,"0");

document.getElementById("sumDist").textContent=km;
document.getElementById("sumTime").textContent=`${m}:${s}`;
document.getElementById("sumCarbon").textContent=(km*EF_CAR).toFixed(3);

// ✅ เพิ่มวันเวลา format 01/02/2026 14:53
const finishTime = new Date();

const day = String(finishTime.getDate()).padStart(2, '0');
const month = String(finishTime.getMonth() + 1).padStart(2, '0');
const year = finishTime.getFullYear();

const hour = String(finishTime.getHours()).padStart(2, '0');
const minute = String(finishTime.getMinutes()).padStart(2, '0');

const formattedDateTime = `${day}/${month}/${year} ${hour}:${minute}`;
document.getElementById("finishDateTime").textContent = formattedDateTime;

document.getElementById("summaryModal").style.display="flex";

navigator.geolocation.clearWatch(watchId);

sessionActive=false;
resetSession();
updateButtons();
};


// SAVE IMAGE
function saveImage(){
const element=document.querySelector(".summary-card");

html2canvas(element).then(canvas=>{
const link=document.createElement("a");
link.download="sustep.png";
link.href=canvas.toDataURL();
link.click();
});
}


// CLOSE
function closeSummary(){
document.getElementById("summaryModal").style.display="none";
}


// RESET
function resetSession(){
totalDistance=0;
lastPoint=null;
pathCoords=[];
elapsedSeconds=0;
isPaused=false;
isTracking=false;

polyline.setPath([]);
document.getElementById("time").textContent="00:00";

updateUI();
}

</script>

</body>
</html>
