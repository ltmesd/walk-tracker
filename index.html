<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>SUSTEP</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyD7xnpAUWUrhzQwSQZlfasfGY7ys3WlGOc"></script>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
html,body{margin:0;height:100%;font-family:system-ui;background:#f4f7f6}
#map{height:100%;width:100%}

/* CONTROL BOX */
.controls{
position:absolute;
left:50%;
transform:translateX(-50%);
bottom:16px;
background:rgba(255,255,255,.96);
padding:14px;
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,.22);
text-align:center;
width:92%;
max-width:320px;
}

/* BUTTON */
button{
padding:12px;
border:none;
border-radius:999px;
font-weight:600;
display:flex;
align-items:center;
justify-content:center; /* ✅ กลาง */
gap:6px;
width:100%;
}

.start{background:#22c55e;color:white}
.pause{background:#f59e0b;color:white}
.finish{background:#ef4444;color:white}

.btn-row{display:flex;gap:8px}
.btn-row button{flex:1}

/* SUMMARY */
#summaryModal{
position:fixed;inset:0;
background:rgba(0,0,0,.45);
display:none;
align-items:center;
justify-content:center;
}

.summary-card{
background:white;
padding:28px;
border-radius:28px;
width:85%;
max-width:320px;
text-align:center;
}

.main-metric{font-size:42px;font-weight:700}
.unit{font-size:16px;color:#666}
.time2{margin:6px 0}
.carbon{color:#16a34a;margin:6px 0}
.date{font-size:13px;color:#999;margin-bottom:16px}

/* ปุ่มล่าง */
.summary-buttons{
display:flex;
gap:10px;
}

.summary-buttons button{
flex:1; /* ✅ เท่ากัน */
}
</style>
</head>

<body>

<div id="map"></div>

<div class="controls">
ระยะทาง: <b><span id="distance">0.00</span> km</b><br>
ลด: <b><span id="carbon">0.000</span></b><br>
เวลา: <span id="time">00:00</span>

<div class="btn-row">
<button id="startBtn" class="start">Start</button>
<button id="pauseBtn" class="pause">Pause</button>
</div>

<button id="finishBtn" class="finish">Finish</button>
</div>

<div id="summaryModal">
<div class="summary-card">

<div class="main-metric">
<span id="sumDist">0.00</span><span class="unit"> km</span>
</div>

<div class="time2">เวลา <span id="sumTime">00:00</span></div>
<div class="carbon">ลด <span id="sumCarbon">0.000</span> kgCO₂e</div>
<div class="date" id="finishDateTime"></div>

<div class="summary-buttons">

<button onclick="saveImage()" class="start">
<svg width="16" height="16" viewBox="0 0 24 24" fill="white">
<path d="M9 2L7 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-3l-2-2H9zm3 5a5 5 0 1 1 0 10 5 5 0 0 1 0-10z"/>
</svg>
Save
</button>

<button onclick="closeSummary()" class="pause">Done</button>

</div>
</div>
</div>

<script>

const EF_CAR=0.192;

let map,polyline,userMarker,watchId;
let totalDistance=0,lastPoint=null,pathCoords=[];
let elapsedSeconds=0,timerInterval;
let isTracking=false,isPaused=false,startTime;

// MAP
function initMap(){
map=new google.maps.Map(document.getElementById("map"),{
center:{lat:13.7563,lng:100.5018},
zoom:16
});
polyline=new google.maps.Polyline({map,path:[],strokeColor:"#22c55e"});
userMarker=new google.maps.Marker({map});
}
window.onload=initMap;

// TIMER
function startTimer(){
timerInterval=setInterval(()=>{
if(!isTracking) return;
elapsedSeconds++;
updateUI();
},1000);
}
function stopTimer(){clearInterval(timerInterval);}

// DISTANCE
function getDistance(p1,p2){
const R=6371000;
const toRad=x=>x*Math.PI/180;
const dLat=toRad(p2.lat-p1.lat);
const dLng=toRad(p2.lng-p1.lng);
const a=Math.sin(dLat/2)**2+
Math.cos(toRad(p1.lat))*Math.cos(toRad(p2.lat))*
Math.sin(dLng/2)**2;
return 2*R*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// 🚶‍♀️ GPS เสถียร
function handlePosition(pos){

if(!isTracking||isPaused) return;

const {latitude,longitude,accuracy}=pos.coords;

// กรอง accuracy
if(accuracy>20) return;

const current={lat:latitude,lng:longitude};

if(lastPoint){

const dist=getDistance(lastPoint,current);

// กันกระโดด
if(dist>50) return;

// กัน jitter
if(dist<2) return;

totalDistance+=dist;
}

lastPoint=current;
pathCoords.push(current);

polyline.setPath(pathCoords);
userMarker.setPosition(current);

// ลดกระตุก
if(pathCoords.length%5===0){
map.panTo(current);
}

updateUI();
}

// UI
function updateUI(){
const km=totalDistance/1000;
distance.textContent=km.toFixed(2);
carbon.textContent=(km*EF_CAR).toFixed(3);

const m=Math.floor(elapsedSeconds/60).toString().padStart(2,"0");
const s=(elapsedSeconds%60).toString().padStart(2,"0");
time.textContent=`${m}:${s}`;
}

// START
startBtn.onclick=()=>{
resetSession();
isTracking=true;
startTime=new Date();
startTimer();

watchId=navigator.geolocation.watchPosition(
handlePosition,
err=>console.error(err),
{enableHighAccuracy:true,maximumAge:0,timeout:10000}
);
};

// PAUSE
pauseBtn.onclick=()=>{
isPaused=!isPaused;
isTracking=!isPaused;
if(isPaused) stopTimer(); else startTimer();
};

// FINISH
finishBtn.onclick=()=>{
stopTimer();

const end=new Date();
const km=Number((totalDistance/1000).toFixed(2));

const m=Math.floor(elapsedSeconds/60).toString().padStart(2,"0");
const s=(elapsedSeconds%60).toString().padStart(2,"0");
const timeText=`${m}:${s}`;

sumDist.textContent=km.toFixed(2);
sumTime.textContent=timeText;
sumCarbon.textContent=(km*EF_CAR).toFixed(3);

finishDateTime.textContent=end.toLocaleString();

summaryModal.style.display="flex";

navigator.geolocation.clearWatch(watchId);
resetSession();
};

// 📸 SAVE (มีไอคอนในรูป)
function saveImage(){
html2canvas(document.querySelector(".summary-card")).then(canvas=>{
const link=document.createElement("a");
link.download="sustep.png";
link.href=canvas.toDataURL();
link.click();
});
}

function closeSummary(){
summaryModal.style.display="none";
}

function resetSession(){
totalDistance=0;
lastPoint=null;
pathCoords=[];
elapsedSeconds=0;
isPaused=false;
isTracking=false;
polyline.setPath([]);
updateUI();
}

</script>

</body>
</html>
